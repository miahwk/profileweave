name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Release quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Verify source and build frontend
        shell: pwsh
        run: ./scripts/verify.ps1 -SkipInstall

      - name: Audit Go call graph
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Audit frontend dependencies
        run: pnpm --dir frontend audit --audit-level high

      - name: Upload frontend bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-frontend
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            extension: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            extension: .exe
            archive: zip
          - goos: linux
            goarch: amd64
            extension: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            extension: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            extension: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            extension: ""
            archive: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Validate semantic version tag
        shell: bash
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Download verified frontend bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-frontend
          path: frontend/dist

      - name: Build and package
        shell: bash
        env:
          TARGET_OS: ${{ matrix.goos }}
          TARGET_ARCH: ${{ matrix.goarch }}
          BINARY_EXTENSION: ${{ matrix.extension }}
          ARCHIVE_FORMAT: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse --short=12 HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          package="profileweave-${GITHUB_REF_NAME}-${TARGET_OS}-${TARGET_ARCH}"
          bundle="release/${package}"

          mkdir -p "${bundle}/frontend"
          cp -R frontend/dist "${bundle}/frontend/dist"
          cp README.md LICENSE NOTICE THIRD_PARTY_NOTICES.md CHANGELOG.md SECURITY.md "${bundle}/"

          ldflags="-s -w"
          ldflags+=" -X github.com/miahwk/profileweave/internal/buildinfo.Version=${version}"
          ldflags+=" -X github.com/miahwk/profileweave/internal/buildinfo.Commit=${commit}"
          ldflags+=" -X github.com/miahwk/profileweave/internal/buildinfo.Date=${build_date}"

          CGO_ENABLED=0 GOOS="${TARGET_OS}" GOARCH="${TARGET_ARCH}" \
            go build -buildvcs=true -trimpath -ldflags "${ldflags}" \
            -o "${bundle}/profileweave${BINARY_EXTENSION}" ./cmd/server

          if [[ "${ARCHIVE_FORMAT}" == "zip" ]]; then
            (cd release && zip -qr "${package}.zip" "${package}")
          else
            tar -C release -czf "release/${package}.tar.gz" "${package}"
          fi

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: profileweave-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/profileweave-*.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  windows-installer:
    name: Build and smoke test Windows installers
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      INNO_SETUP_VERSION: "6.7.3"
      INNO_SETUP_URL: https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe
      INNO_SETUP_SHA256: 9c73c3bae7ed48d44112a0f48e66742c00090bdb5bef71d9d3c056c66e97b732

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Validate semantic version tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
            throw "invalid release tag: $env:GITHUB_REF_NAME"
          }

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Download verified frontend bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-frontend
          path: frontend/dist

      - name: Build amd64 installer
        id: amd64
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $commit = (git rev-parse --short=12 HEAD).Trim()
          $buildDate = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
          $installer = ./scripts/build-windows-installer.ps1 `
            -Architecture amd64 `
            -Version $version `
            -Commit $commit `
            -BuildDate $buildDate `
            -InnoSetupVersion $env:INNO_SETUP_VERSION `
            -InnoSetupURL $env:INNO_SETUP_URL `
            -InnoSetupSHA256 $env:INNO_SETUP_SHA256
          "installer=$installer" >> $env:GITHUB_OUTPUT

      - name: Smoke test amd64 install lifecycle
        shell: pwsh
        run: ./scripts/smoke-windows-installer.ps1 -InstallerPath '${{ steps.amd64.outputs.installer }}' -Version $env:GITHUB_REF_NAME

      - name: Build arm64 installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $commit = (git rev-parse --short=12 HEAD).Trim()
          $buildDate = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
          ./scripts/build-windows-installer.ps1 `
            -Architecture arm64 `
            -Version $version `
            -Commit $commit `
            -BuildDate $buildDate `
            -InnoSetupVersion $env:INNO_SETUP_VERSION `
            -InnoSetupURL $env:INNO_SETUP_URL `
            -InnoSetupSHA256 $env:INNO_SETUP_SHA256

      - name: Upload Windows installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: profileweave-windows-installers
          path: release/profileweave-*-windows-*-setup.exe
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: [build, windows-installer]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository for SBOM
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: profileweave-*
          path: release
          merge-multiple: true

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: release/profileweave-${{ github.ref_name }}-sbom.spdx.json
          upload-artifact: false

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: release/*

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: true
          prerelease: true
          overwrite_files: false
          body: |
            > Windows setup and executable files in this preview are not yet
            > Authenticode-signed and may trigger an Unknown Publisher or
            > SmartScreen warning. Verify SHA256SUMS and GitHub provenance;
            > do not bypass organizational endpoint-security policy.
          fail_on_unmatched_files: true
          files: |
            release/profileweave-*.zip
            release/profileweave-*.tar.gz
            release/profileweave-*-setup.exe
            release/profileweave-*-sbom.spdx.json
            release/SHA256SUMS
